interview_task:
  description: >
    Ask the user clarifying questions in the terminal about their vision for the project: {topic}.
    Do not proceed until you have a comprehensive understanding of the requirements.
  expected_output: >
    A detailed summary of the gathered requirements.
  agent: requirement_analyst

document_task:
  description: >
    Based on the interview context, generate two files: 
    1. 'requirements.md' (Software Requirement Specification)
    2. 'plan.md' (Implementation Plan)
  expected_output: >
    The files requirements.md and plan.md are created with detailed content.
  agent: requirement_analyst
