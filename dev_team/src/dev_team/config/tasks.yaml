interview_task:
  description: >
    Start a conversation in the terminal with the user to understand their vision 
    for the topic: {topic}. 
    Ask the user questions via terminal. After each response, evaluate if you have 
    enough details (Features, Audience, Tech Stack, Constraints). 
    If not, ask more questions. If yes, provide a Final Answer summarizing 
    everything you've learned.
  expected_output: >
    A comprehensive summary of the project requirements gathered from the user.
  agent: requirement_analyst
  human_input: true

srs_generation_task:
  description: >
    Based on the summary from the interview, generate a professional 
    Software Requirement Specification (SRS) document. 
    Ensure it covers all technical and functional requirements.
  expected_output: >
    A complete requirements.md file.
  agent: requirement_analyst

plan_generation_task:
  description: >
    Based on the SRS document, create a step-by-step implementation plan 
    and proposed project structure.
  expected_output: >
    A complete plan.md file.
  agent: requirement_analyst
